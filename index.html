<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>After Hours Rotation · Integris</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080c12;
  --surface: #0f1623;
  --surface2: #141d2e;
  --surface3: #1a2438;
  --border: rgba(56,189,248,0.14);
  --border-mid: rgba(56,189,248,0.28);
  --border-bright: rgba(56,189,248,0.55);
  --text: #dce8f5;
  --text-mid: #8aa4c0;
  --text-soft: #4a6280;
  --cyan: #38bdf8;
  --cyan-dim: rgba(56,189,248,0.13);
  --green: #34d399;
  --green-dim: rgba(52,211,153,0.13);
  --amber: #fbbf24;
  --amber-dim: rgba(251,191,36,0.13);
  --radius: 8px;
  --radius-sm: 5px;
}
body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 5rem;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 900px; height: 500px;
  background: radial-gradient(ellipse at center, rgba(56,189,248,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.grid-bg {
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(56,189,248,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
.topbar {
  background: rgba(8,12,18,0.92);
  border-bottom: 1px solid var(--border);
  padding: 0.875rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(8px);
}
.logo-wrap { display: flex; align-items: center; gap: 14px; }
.logo-img { height: 28px; width: auto; filter: brightness(0) invert(1); opacity: 0.92; }
.logo-divider { width: 1px; height: 22px; background: var(--border-mid); }
.logo-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-soft); }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s infinite; }
.live-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.page { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.25rem 2rem; position: relative; z-index: 1; }
header { margin-bottom: 2.25rem; animation: fadeUp 0.6s ease both; }
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
.header-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-mid), transparent); }
.eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--cyan); white-space: nowrap; }
h1 { font-family: 'IBM Plex Mono', monospace; font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; margin-bottom: 6px; }
h1 span { color: var(--cyan); }
.subtitle { font-size: 12px; color: var(--text-soft); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.04em; }
.stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 2rem; animation: fadeUp 0.6s 0.08s ease both; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.125rem; position: relative; overflow: hidden; transition: border-color 0.2s; }
.stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); opacity: 0.35; }
.stat-card:hover { border-color: var(--border-mid); }
.stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-soft); margin-bottom: 8px; }
.stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 28px; font-weight: 600; color: var(--cyan); line-height: 1; }
.stat-value.name { font-size: 13px; font-weight: 500; padding-top: 4px; color: var(--text); line-height: 1.4; }
.controls { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; animation: fadeUp 0.6s 0.14s ease both; }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-soft); pointer-events: none; }
input[type="text"] { width: 100%; height: 38px; padding: 0 12px 0 36px; border: 1px solid var(--border-mid); border-radius: var(--radius-sm); background: var(--surface); font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; letter-spacing: 0.02em; }
input[type="text"]:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(56,189,248,0.08); }
input[type="text"]::placeholder { color: var(--text-soft); }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn { height: 38px; padding: 0 14px; border: 1px solid var(--border-mid); border-radius: var(--radius-sm); background: var(--surface); font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-mid); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.filter-btn:hover { border-color: var(--border-bright); color: var(--text); }
.filter-btn.active { background: var(--cyan-dim); border-color: var(--cyan); color: var(--cyan); }
 
.two-col { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
 
.panel-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-soft); margin-bottom: 0.75rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.panel-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
 
.history-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; animation: fadeUp 0.5s 0.1s ease both; }
.history-panel-header { padding: 0.875rem 1rem; border-bottom: 1px solid var(--border); }
.history-panel-header p { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-soft); }
.hist-table { width: 100%; border-collapse: collapse; }
.hist-table th { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.hist-table td { font-size: 12px; padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.hist-table tr:last-child td { border-bottom: none; }
.hist-table tr:hover td { background: var(--surface2); }
.hist-name { color: var(--text); font-weight: 500; white-space: nowrap; font-size: 13px; }
.hist-dates { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-soft); white-space: nowrap; }
.hist-avatar { width: 26px; height: 26px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; border: 1px solid; flex-shrink: 0; }
 
.section-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-soft); margin: 1.25rem 0 0.75rem; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.section-label::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
.list { display: flex; flex-direction: column; gap: 6px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1.125rem; display: flex; align-items: center; gap: 14px; transition: border-color 0.2s, background 0.2s, transform 0.15s; animation: fadeUp 0.4s ease both; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--border); transition: background 0.2s, box-shadow 0.2s; }
.card:hover { border-color: var(--border-mid); background: var(--surface2); transform: translateX(3px); }
.card:hover::before { background: var(--cyan); }
.card.is-current { border-color: rgba(56,189,248,0.35); background: var(--surface2); }
.card.is-current::before { background: var(--cyan); box-shadow: 0 0 10px rgba(56,189,248,0.6); }
.card.is-loa, .card.is-covered { opacity: 0.5; }
.avatar { width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; flex-shrink: 0; letter-spacing: 0.05em; border: 1px solid; }
.card-body { flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-dates { font-size: 12px; color: var(--text-mid); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.03em; }
.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 3px; white-space: nowrap; letter-spacing: 0.08em; text-transform: uppercase; border: 1px solid; }
.badge-current  { background: var(--cyan-dim);  color: var(--cyan);  border-color: rgba(56,189,248,0.3); }
.badge-upcoming { background: var(--surface3);  color: var(--text-mid); border-color: var(--border); }
.badge-past     { background: transparent;      color: var(--text-soft); border-color: var(--border); }
.badge-loa      { background: var(--amber-dim); color: var(--amber); border-color: rgba(251,191,36,0.3); }
.badge-covered  { background: var(--green-dim); color: var(--green); border-color: rgba(52,211,153,0.3); }
.week-str { font-size: 10px; color: var(--text-soft); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.04em; }
.empty { text-align: center; padding: 3rem; color: var(--text-soft); font-size: 13px; font-family: 'IBM Plex Mono', monospace; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
.footer { text-align: center; margin-top: 3rem; font-size: 10px; color: var(--text-soft); font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.08em; display: flex; align-items: center; justify-content: center; gap: 12px; }
.footer-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--border-mid)); }
.footer-line.r { background: linear-gradient(270deg, transparent, var(--border-mid)); }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@media (max-width: 760px) {
  h1 { font-size: 22px; }
  .stats { grid-template-columns: repeat(2, minmax(0,1fr)); }
  .two-col { grid-template-columns: 1fr; }
  .card-right .week-str { display: none; }
  .topbar { padding: 0.75rem 1rem; }
  .logo-label, .logo-divider { display: none; }
}
</style>
</head>

      <div class="header-line"></div>

    <p class="subtitle">// weekly assignments · status auto-updates on load</p>
  </header>

    <div class="stat-card">
      <p class="stat-label">// total_weeks</p>
      <p class="stat-value" id="stat-total">—</p>

      <p class="stat-label">// on_call_now</p>

function parseD(s) {
  if (!s) return null;
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y,m-1,d);
}
function fmtDate(s) {
  if (!s) return '';
  return parseD(s).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function avatarColor(name) {
  let h = 0;
  for (const c of name) h = (h*31 + c.charCodeAt(0)) & 0xffff;
  return COLORS[h % COLORS.length];
}
function initials(name) {
  return name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
}
function getStatus(r) {
  if (r.note === 'loa') return 'loa';
  if (r.note === 'covered') return 'covered';
  const today = new Date(); today.setHours(0,0,0,0);
  const s = parseD(r.start), e = parseD(r.end);
  if (today >= s && today <= e) return 'current';
  if (s > today) return 'upcoming';
  return 'past';
}
 
let activeFilter = 'all';
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}
 
function renderHistory() {
  const today = new Date(); today.setHours(0,0,0,0);
  const past = rotation
    .filter(r => r.start && r.end && parseD(r.end) < today)
    .sort((a,b) => parseD(b.start) - parseD(a.start));
 
  const tbody = document.getElementById('hist-body');
  if (!past.length) {
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:1.5rem;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-soft);">// no past shifts yet</td></tr>`;
    return;
  }
  tbody.innerHTML = past.map(r => {
    const col = avatarColor(r.name);
    const ini = initials(r.name);
    return `<tr>
      <td style="padding-left:12px;width:36px;">
        <div class="hist-avatar" style="background:${col.bg};color:${col.text};border-color:${col.border}">${ini}</div>
      </td>
      <td><span class="hist-name">${r.name}</span></td>
      <td><span class="hist-dates">${fmtDate(r.start)} – ${fmtDate(r.end)}</span></td>
    </tr>`;
  }).join('');
}
 
function cardHTML(r, delay) {
  const status = getStatus(r);
  const col = avatarColor(r.name);
  const ini = initials(r.name);
  let dateStr = r.start && r.end ? `${fmtDate(r.start)} – ${fmtDate(r.end)}` : status === 'loa' ? 'leave_of_absence' : 'covered_by_hussein';
  let badge = '';
  if (status === 'current')       badge = '<span class="badge badge-current">● live</span>';
  else if (status === 'upcoming') badge = '<span class="badge badge-upcoming">upcoming</span>';
  else if (status === 'loa')      badge = '<span class="badge badge-loa">loa</span>';
  else if (status === 'covered')  badge = '<span class="badge badge-covered">covered</span>';
  const weekStr = r.start ? `wk · ${fmtDate(r.start)}` : '';
  const extraClass = status === 'current' ? 'is-current' : status === 'loa' ? 'is-loa' : status === 'covered' ? 'is-covered' : '';
  return `<div class="card ${extraClass}" style="animation-delay:${delay}ms">
    <div class="avatar" style="background:${col.bg};color:${col.text};border-color:${col.border}">${ini}</div>
    <div class="card-body">
      <p class="card-name">${r.name}</p>
      <p class="card-dates">${dateStr}</p>
    </div>
    <div class="card-right">
      ${badge}
      ${weekStr ? `<span class="week-str">${weekStr}</span>` : ''}
    </div>
  </div>`;
}
 
function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const listEl = document.getElementById('list');
  const today = new Date(); today.setHours(0,0,0,0);
 
  let items = rotation.filter(r => {
    if (!r.name.toLowerCase().includes(q)) return false;
    const s = getStatus(r);
    if (activeFilter === 'current') return s === 'current';
    if (activeFilter === 'upcoming') return s === 'upcoming';
    return s === 'current' || s === 'upcoming' || s === 'loa' || s === 'covered';
  });
 
  if (!items.length) { listEl.innerHTML = '<div class="empty">// no_results_found</div>'; return; }
 
  const groups = { current:[], upcoming:[], loa:[], covered:[] };
  items.forEach(r => {
    const s = getStatus(r);
    if (groups[s]) groups[s].push(r);
  });
 
  let html = '', delay = 0;
  function section(label, arr) {
    if (!arr.length) return;
    html += `<div class="section-label">${label}</div>`;
    arr.forEach(r => { html += cardHTML(r, delay); delay += 35; });
  }
  section('// current', groups.current);
  section('// upcoming', groups.upcoming);
  const special = [...groups.loa, ...groups.covered];
  if (special.length) section('// special_status', special);
 
  listEl.innerHTML = html;
}
 
function initStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const scheduled = rotation.filter(r => r.start && r.end);
  document.getElementById('stat-total').textContent = scheduled.length;
  const cur = scheduled.find(r => today >= parseD(r.start) && today <= parseD(r.end));
  document.getElementById('stat-current').textContent = cur ? cur.name : '—';
  const nxt = scheduled.filter(r => parseD(r.start) > today).sort((a,b)=>parseD(a.start)-parseD(b.start))[0];
  document.getElementById('stat-next').textContent = nxt ? nxt.name : '—';
  const now = new Date();
  document.getElementById('footer-text').textContent =
    `sys.loaded · ${now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} · ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;
}
 
initStats();
renderHistory();
render();
</script>
